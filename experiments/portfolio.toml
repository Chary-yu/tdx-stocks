# ============================================================
# 投资组合构建配置文件
# 用途：基于选股信号，构建符合风控要求的投资组合
# 简单说：选出股票后，决定「买多少、怎么分配、有什么限制」
# ============================================================

[task]
type = "portfolio"
name = "latest-consensus-portfolio"

# -------------------- 组合核心参数 --------------------
[portfolio]
# 股票来源：从哪里获取候选股票
# 备选方案：
#   - "consensus"：多策略共识（多个策略都看好的股票，推荐）
#   - "single"：单策略（只用策略列表中的第一个）
#   - "union"：策略并集（任何策略看好的都纳入）
#   - "intersection"：策略交集（所有策略都看好的才纳入，非常严格）
source = "consensus"

# 从候选池中选取前N只股票
# 备选方案：5（高度集中）| 10（标准）| 20（分散）| 30（高度分散）
top = 20

# 【权重分配方法】—— 这是最核心的决策之一
# -------------------------------------------------------------
# 【备选1】"equal"（等权重）
#   含义：每只股票买同样的金额，比如10只股票各买10%
#   适用：没有特别偏好，或策略评分置信度不高时
#   联动：无需额外参数，最简单
#   优点：分散性好，不用调参
#   缺点：无法突出好机会
# -------------------------------------------------------------
# 【备选2】"liquidity-risk"（流动性风险加权）
#   含义：流动性越好的股票，权重越大
#   适用：大资金（>1000万），或市场流动性较差时
#   联动：需设置 max_adv_participation 和 max_liquidation_days
#   优点：避免冲击成本，容易买卖
#   缺点：可能错失流动性差但涨幅大的股票
# -------------------------------------------------------------
# 【备选3】"signal-strength"（信号强度加权）
#   含义：策略评分越高的股票，权重越大
#   适用：策略评分系统成熟，评分能有效预测收益
#   联动：min_score 需较高（70+），避免噪音
#   优点：突出重点机会，收益潜力大
#   缺点：集中度高，容错率低
# -------------------------------------------------------------
# 【备选4】"hybrid"（混合加权，推荐）
#   含义：综合考虑信号强度、流动性、行业强弱等多个因素
#   适用：大多数情况，最通用
#   联动：需配置下方的 weighting_hybrid 各子项权重
#   优点：平衡，鲁棒性好，不会过于极端
# -------------------------------------------------------------
# 【备选5】"risk-parity"（风险平价）
#   含义：让每只股票对组合的风险贡献相等
#   适用：专业机构，对风险管理要求极高
#   联动：需配置 risk_metric 和 lookback_days
#   优点：各资产风险贡献相等，非常稳健
#   缺点：计算复杂，对小资金不友好
# -------------------------------------------------------------
weighting = "hybrid"

# ----- 混合权重的具体构成（仅当 weighting = "hybrid" 时生效）-----
[portfolio.weighting_hybrid]
# 各项权重之和必须为 1.0（100%）

# 信号强度权重
# 含义：策略评分越高的股票，权重越大
# 备选方案：0.20（低）| 0.40（中）| 0.60（高）| 0.80（极高）
# 联动建议：如果 min_score 较高（>70），可提高此权重至0.6+
signal_strength = 0.40

# 流动性风险权重
# 含义：成交额越大、流动性越好的股票，权重越大
# 备选方案：0.10（低）| 0.30（中）| 0.50（高）
# 联动建议：资金量越大，此权重应越高
#   - <100万资金：0.10
#   - 100万-1000万：0.30
#   - >1000万：0.50
liquidity_risk = 0.30

# 行业相对强弱权重
# 含义：行业表现越好的股票，权重越大
# 备选方案：0.05（低）| 0.20（中）| 0.35（高）
# 联动建议：轮动市/结构性行情 → 提高至0.35；普涨普跌/熊市 → 降低至0.10以下
sector_alpha = 0.20

# 事件置信度权重
# 含义：有事件催化剂（如财报超预期）的股票，权重越大
# 备选方案：0.00（禁用）| 0.10（低）| 0.20（中）| 0.30（高）
# 联动建议：如果启用了 event_calendar.toml，建议设为0.10-0.20
event_confidence = 0.10

# ----- 等权重配置（仅当 weighting = "equal" 时生效）-----
# [portfolio.weighting_equal]
# 无额外参数，所有股票权重相同

# ----- 风险平价配置（仅当 weighting = "risk-parity" 时生效）-----
# [portfolio.weighting_risk_parity]
# risk_metric = "volatility"   # 备选: volatility | var | cvar
# lookback_days = 60

# 单只股票最大权重（占总组合的比例）
# 含义：任何一只股票，都不能超过组合总价值的这个比例
# 备选方案：0.05（5%，高度分散）| 0.10（10%，标准）| 0.15（15%，集中）| 0.25（25%，非常集中）
# 联动建议：持仓数量 top=5 → 上限0.20；top=10 → 上限0.10-0.15；top=20 → 上限0.05-0.10
max_weight = 0.10

# 总资金量（单位：元）
# 备选方案：
#   - 100000（10万，小资金）
#   - 1000000（100万，中资金）
#   - 10000000（1000万，大资金）
#   - 100000000（1亿，机构）
capital = 10000000

# 最大参与成交额比例
# 含义：单日买入某股票的量，不超过该股票当日成交额的多少比例
# 举例：股票日成交额1亿，max=0.10，则单日最多买入1000万
# 备选方案：0.05（5%，非常保守）| 0.10（10%，标准）| 0.20（20%，激进）
max_adv_participation = 0.10

# 最大清仓天数（交易日）
# 含义：假设需要清仓某股票，预计需要多少天才能卖完
# 备选方案：0.5（半天，高流动性）| 1（1天，标准）| 2（2天）| 5（5天，低流动性）
max_liquidation_days = 0.5

# 是否启用市场状态判断
# 含义：根据市场是牛市还是熊市，自动调整仓位
# 备选方案：true（启用，推荐）| false（禁用，始终满仓）
# 联动建议：如果启用了 macro_filter.toml，建议设为 true
market_regime_enabled = true

# 单行业最大权重
# 含义：任何一个行业（如医药、科技），不能超过组合的多少比例
# 备选方案：0.15（15%，严格分散）| 0.25（25%，标准）| 0.35（35%，宽松）| 0.50（50%，无限制）
max_sector_weight = 0.25

# 排除带有以下风险标签的股票
# 含义：自动过滤掉有这些标签的股票
# 备选方案：
#   - []：不排除任何股票
#   - ["high_volatility"]：排除高波动股票
#   - ["low_liquidity"]：排除低流动性股票
#   - ["high_volatility", "low_liquidity"]：两者都排除（推荐）
exclude_risk_tags = ["high_volatility", "low_liquidity"]

# 成交额低于此值时，降低参与率（保护机制）
# 含义：对于小成交额的股票，自动降低买入比例，避免冲击市场
min_adv_for_same_rate = 10000000
low_adv_participation = 0.05

# -------------------- 市场状态规则 --------------------
# 根据不同的市场环境，动态调整仓位
[portfolio.regime]
# 市场状态判断方法
# 备选方案：
#   - "trend_following"：趋势跟随（根据指数均线判断，推荐）
#   - "volatility_regime"：波动率状态（根据VIX等）
#   - "simple_binary"：简单二值（指数>200日均线为牛，否则为熊）
detection_method = "trend_following"

# 不同市场状态下的仓位规则
[portfolio.regime.mapping]

# 牛市（上升趋势）配置
[portfolio.regime.mapping.bull_trend]
max_weight = 0.15      # 单只股票上限提高到15%
max_sector = 0.35      # 单行业上限提高到35%
cash_ratio = 0.00      # 不保留现金，满仓操作

# 熊市（下跌趋势）配置
[portfolio.regime.mapping.bear_market]
max_weight = 0.05      # 单只股票上限降低到5%
max_sector = 0.15      # 单行业上限降低到15%
cash_ratio = 0.30      # 保留30%现金，降低风险

# 震荡市（横盘整理）配置
[portfolio.regime.mapping.sideways]
max_weight = 0.08      # 单只股票上限8%
max_sector = 0.20      # 单行业上限20%
cash_ratio = 0.10      # 保留10%现金

# -------------------- 绩效归因配置（新增）--------------------
# 用途：分析组合的收益来源
[portfolio.attribution]
# 是否启用绩效归因
enabled = true

# 基准指数（用来对比的组合表现）
# 备选方案：
#   - "000300.SH"：沪深300指数（大盘股代表）
#   - "000905.SH"：中证500指数（中盘股代表）
#   - "000852.SH"：中证1000指数（小盘股代表）
benchmark = "000300.SH"

# 归因维度：分析收益来自哪里
# 备选方案：
#   - ["sector"]：只看行业配置
#   - ["factor"]：只看因子（价值、成长等）
#   - ["sector", "factor"]：两者都看（推荐）
dimensions = ["sector", "factor"]

# 因子归因中使用的因子
factors = ["value", "growth", "momentum", "size", "volatility"]

# 归因频率
# 备选方案： "daily"（每天）| "weekly"（每周）| "monthly"（每月）
frequency = "weekly"

# 是否生成归因报告
generate_report = true

# -------------------- 专家干预入口 --------------------
# 允许人工覆盖系统的某些决策
[portfolio.override]
# 手动排除的股票代码列表（即使策略选出，也不买入）
# 备选方案：[]（不排除）| ["000001", "600036"]（排除平安银行、招商银行）
manual_exclusions = []

# 是否允许超配某个行业（超过 max_sector_weight 限制）
# 备选方案：true（允许）| false（不允许）
sector_overweight_allowed = false

# -------------------- 输出配置 --------------------
[output]
save = true
dir = "reports/portfolios"
formats = ["json", "table"]
