[task]
type = "backtest"
name = "trend-strength-backtest"

[strategy]
name = "trend-strength"
limit = 10
min_score = 60
min_amount_ma20 = 150000000

[backtest]
from_date = "2024-10-01"
to_date = "2024-12-31"
top = 5
hold_days = 10  # 最大持有天数；技术退出规则将逐步替代固定天数退出
rolling = false
fee_bps = 3
slippage_bps = 5

[output]
save = true
dir = "reports/backtests"
formats = ["json", "table"]
