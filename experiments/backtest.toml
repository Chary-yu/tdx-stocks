# ============================================================
# 策略回测配置文件
# 用途：对选股策略进行历史回测，评估策略在过去一段时间内的表现
# 简单说：这个文件告诉系统「用什么方法、在什么时间段、测试哪些股票」
# ============================================================

# -------------------- 任务基本信息 --------------------
[task]
# 任务类型：backtest 表示回测任务
# 备选方案：
#   - "backtest"   : 标准回测（推荐）
#   - "grid_search": 网格搜索（自动尝试多组参数）
#   - "optimize"   : 参数优化（寻找最优参数）
type = "backtest"

# 任务名称：可以随意命名，用于区分不同的回测运行
# 备选方案：
#   - "trend-strength-backtest"（趋势强度回测）
#   - "momentum-60d-backtest"  （60日动量回测）
#   - "value-factor-q4"        （价值因子四季度测试）
name = "trend-strength-backtest"

# -------------------- 策略参数 --------------------
[strategy]
# 策略名称：选择使用哪种选股方法
# -------------------------------------------------------------
# 【备选策略1】"trend-strength"（趋势强度策略）
#   含义：寻找价格处于上升趋势的股票，趋势越强得分越高
#   适用：牛市或明显的上涨行情
#   【如果选择此策略，其他参数建议设置为】：
#     min_score = 60~70（要求较高，确保趋势明确）
#     exit_rules.stop_loss_ma20 = true（跌破均线要卖出）
#     exit_rules.momentum_turn_negative = true（动量转负要卖出）
#     max_days = 20~40（持有时间可稍长）
# -------------------------------------------------------------
# 【备选策略2】"relative-strength"（相对强度/RSI策略）
#   含义：衡量股票相对于大盘的强弱，RSI指标识别超买超卖
#   适用：震荡市，股票来回波动时效果好
#   【如果选择此策略，其他参数建议设置为】：
#     min_score = 50~60（要求可稍低，因为震荡市信号多）
#     take_profit_atr = 3.0（止盈要快，因为波动快）
#     max_days = 10~15（持有时间较短）
#     stop_loss_ma20 = false（震荡市跌破均线可能是买入点）
# -------------------------------------------------------------
# 【备选策略3】"mean-reversion"（均值回归策略）
#   含义：当价格偏离平均线太多时，预计会回归平均线
#   适用：震荡市，股票涨多了会跌、跌多了会涨
#   【如果选择此策略，其他参数建议设置为】：
#     min_score = 50（不需要太高，本身就是逆向交易）
#     momentum_turn_negative = false（动量转负反而是买入信号）
#     max_days = 10（回归通常较快）
#     stop_loss_atr = 1.5（更紧的止损，因为逆势风险大）
# -------------------------------------------------------------
# 【备选策略4】"value-factor"（价值因子策略）
#   含义：寻找市盈率低、市净率低的「便宜」股票
#   适用：熊市末期或价值回归行情，需要耐心等待
#   【如果选择此策略，其他参数建议设置为】：
#     min_score = 60（需要一定安全边际）
#     min_days = 10（价值回归需要时间，不能频繁交易）
#     max_days = 40~60（可以持有较长时间）
#     建议配合 macro_filter 使用，在利率下降周期效果更好
# -------------------------------------------------------------
# 【备选策略5】"growth-factor"（成长因子策略）
#   含义：寻找利润增速快、营收增长高的「成长」股票
#   适用：牛市或成长风格占优的市场
#   【如果选择此策略，其他参数建议设置为】：
#     min_score = 70（要求更严格，确保成长质量）
#     take_profit_atr = 5.0（让利润奔跑，不止盈太早）
#     max_days = 20~40（持有期中等偏长）
#     注意：利率上升周期对成长股不利，要谨慎
# -------------------------------------------------------------
name = "trend-strength"

# 最多输出的股票数量
# 含义：策略评分后，只取排名前 N 只股票
# 备选方案：5（高度集中）| 10（标准）| 20（分散）| 30（高度分散）
# 选择建议：资金量小选5-10只，资金量大选15-20只
limit = 10

# 策略最低评分（0-100分制）
# 含义：只有评分达到这个分数的股票才会被考虑
# 备选方案：40（宽松）| 60（标准）| 70（严格）| 80（非常严格）
# 选择建议：趋势策略用60+；反转策略用50+；成长策略用70+
min_score = 60

# 流动性门槛：20日均线对应的成交额
# 含义：过去20天平均每天成交多少金额（单位：元）
#       门槛越高，选的股票流动性越好，越容易买卖
# 备选方案：
#   - 50000000（5000万）：小资金可用，选股范围广
#   - 100000000（1亿）：   标准，大多数用户适用
#   - 150000000（1.5亿）： 推荐，平衡流动性和收益
#   - 300000000（3亿）：   大资金必须用，避免冲击成本
min_amount_ma20 = 150000000

# -------------------- 回测时间与执行参数 --------------------
[backtest]
# 回测起始日期（格式：年-月-日）
# 备选方案：建议至少选择6个月以上的时间段
from_date = "2024-12-01"

# 回测结束日期
# 备选方案：通常设为最近一个交易日
to_date = "2024-12-31"

# 每期持有的股票数量上限
# 含义：每次调仓时，最多持有多少只股票
# 备选方案：3（高度集中）| 5（适中）| 10（分散）| 20（高度分散）
top = 5

# 是否滚动回测
# 含义：滚动=true时，每天重新选股并调仓（接近真实交易）
#       滚动=false时，只在起始日选一次，一直持有到期
# 备选方案：
#   - false：买入并持有（适合价值/成长策略）
#   - true：每日调仓（适合趋势/动量策略）
# 注意：建议默认设为 true，更接近实盘，避免过拟合
rolling = false

# 预热期天数
# 含义：刚开始的N天不纳入绩效统计，让策略「进入状态」
# 备选方案：0（无预热）| 5（标准）| 10（保守）
warmup_days = 5

# 交易费用（万分之几）
# 含义：买卖股票时的手续费，万分之三=0.03%
# 备选方案：1（VIP费率）| 2.5（普通散户）| 3（标准）| 5（高费率）
fee_bps = 3

# 滑点成本（万分之几）
# 含义：模拟实际成交时，成交价与信号价的差异
#       流动性越差的股票，滑点越大
# 备选方案：1（流动性极好）| 5（标准）| 10（流动性差）| 20（小市值）
slippage_bps = 5

# -------------------- 退出规则 --------------------
# 含义：什么时候卖出股票（替代了传统的「固定持有N天」）
[exit_rules]
# 是否启用动态退出规则
# 备选方案：true（启用，推荐）| false（使用固定持有天数）
enabled = true

# ----- 技术止损止盈（基于价格的技术指标）-----
[exit_rules.technical]
# 【ATR止损倍数】
# 含义：ATR是「平均真实波幅」，衡量股票每天波动多大
#       当价格从最高点下跌超过「ATR × 倍数」时，强制卖出
# 举例：ATR=1元，倍数=2，则下跌超过2元就卖出
# 备选方案：
#   - 1.5：紧密止损，适合高波动市场（止损快，但也容易被震出去）
#   - 2.0：标准，适合大多数情况（推荐）
#   - 2.5：宽松，给股票更多波动空间
#   - 3.0：非常宽松，适合长线持有
# 策略联动：
#   - 趋势策略 → 2.0
#   - 反转策略 → 1.5
#   - 长线策略 → 2.5-3.0
stop_loss_atr = 2.0

# 【ATR止盈倍数】
# 含义：当价格上涨超过「ATR × 倍数」时，获利卖出
# 备选方案：
#   - 3.0：快速止盈，落袋为安
#   - 4.0：标准，收益风险比2:1（推荐）
#   - 5.0：让利润奔跑，适合趋势策略
#   - -1：禁用止盈（永远不止盈，让利润一直跑）
# 重要原则：止盈倍数 ≥ 止损倍数 × 2（例如止损2.0，止盈至少4.0）
take_profit_atr = 4.0

# 【是否在跌破均线时卖出】
# 含义：均线是过去一段时间的平均价格，跌破均线说明趋势可能转弱
# 备选方案：true（启用）| false（禁用）
# 均线周期建议：
#   - ma10（10日均线）：短线，反应快
#   - ma20（20日均线）：中短线，推荐
#   - ma60（60日均线）：中线，信号更可靠
# 策略联动：
#   - 趋势策略 → true（跌破均线是趋势转弱的信号）
#   - 反转策略 → false（本来就是抄底，跌破均线反而可能是加仓点）
stop_loss_ma20 = true

# 【是否在动量转负时卖出】
# 含义：动量是衡量价格上涨动力的指标，转负说明上涨动力衰竭
# 备选方案：true（启用）| false（禁用）
# 策略联动：
#   - 趋势策略 → true（动量是核心）
#   - 均值回归策略 → false（动量转负时反而是买入机会）
momentum_turn_negative = true

# ----- 持有时间兜底（防止无限持有）-----
[exit_rules.max_hold]
# 最长持有天数
# 含义：最多持有多久，不管盈亏都要卖出（兜底规则）
# 备选方案：10（短线）| 20（中短线）| 40（中线）| 60（中长线）
max_days = 10

# 最短持有天数
# 含义：最少持有多久，避免频繁交易
# 备选方案：1（允许次日卖出）| 3（短线）| 5（中线）| 10（长线）
min_days = 3

# 是否在达到最长持有天数时强制卖出
# 备选方案：true（强制卖出）| false（继续持有，仅作警告）
exit_on_timeout = true

# ----- 信号反转退出 -----
[exit_rules.signal_exit]
# 评分低于此阈值时考虑卖出
# 含义：如果股票的评分从60分跌到了40分，说明策略不再看好
# 备选方案：30（极弱）| 40（较弱）| 50（中性）
# 建议设置：买入阈值 - 20（例如买入阈值60，则退出阈值40）
exit_when_score_below = 40

# 连续多少天低于阈值后触发卖出
# 含义：避免因为一两天的小波动就错误卖出
# 备选方案：1（立即触发）| 2（标准）| 3（保守）| 5（非常保守）
recheck_days = 2

# -------------------- 输出配置 --------------------
[output]
# 是否保存回测结果
save = true

# 结果保存目录
dir = "reports/backtests"

# 输出文件格式
# 备选方案：
#   - ["json"]：机器可读，适合程序处理
#   - ["table"]：人类可读表格，适合查看
#   - ["json", "table"]：两者都要（推荐）
formats = ["json", "table"]
