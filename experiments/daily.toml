# ============================================================
# 每日工作流配置文件
# 用途：串联所有模块，执行每日的完整工作流程
# 简单说：这是系统的「总控制器」，每天运行一次，完成从选股到调仓的全流程
# ============================================================

[task]
# 任务类型：daily 表示每日工作流
# 备选方案：
#   - "daily"：每日工作流（推荐）
#   - "weekly"：每周工作流（低频交易）
#   - "manual"：手动触发（不自动运行）
type = "daily"

# 任务名称
# 备选方案：任意描述性名称
name = "daily-workflow"

# -------------------- 数据配置 --------------------
[data]
# 数据日期
# -------------------------------------------------------------
# 【备选1】"latest"（最新）
#   含义：使用最新的可用数据
#   适用：实时交易系统
#
# 【备选2】"auto"（自动，推荐）
#   含义：自动获取最近一个交易日的数据
#   适用：大多数情况
#
# 【备选3】"2024-12-31"（指定日期）
#   含义：使用指定日期的数据（回测或复盘时用）
#   适用：历史回测或问题复盘
# -------------------------------------------------------------
as_of = "auto"

# 数据源配置（可选）
# [data.source]
# # 股票池范围
# # 备选：["all"]（全部A股）| ["hs300"]（沪深300）| ["zz500"]（中证500）| ["zz1000"]（中证1000）
# universe = ["all"]
#
# # 是否缓存数据
# cache_enabled = true
# cache_ttl_hours = 4

# -------------------- 策略配置 --------------------
# 含义：运行哪些选股策略
[strategies]
# 启用的策略列表
# -------------------------------------------------------------
# 【单策略模式】- 最简单
#   enabled = ["trend-strength"]
#
# 【双策略互补模式】- 推荐
#   enabled = ["trend-strength", "relative-strength"]
#
# 【多策略稳健模式】- 专业用户
#   enabled = ["trend-strength", "relative-strength", "value-factor"]
#
# 【基本面模式】
#   enabled = ["value-factor", "growth-factor", "quality-factor"]
# -------------------------------------------------------------
enabled = ["trend-strength", "relative-strength"]

# 每个策略最多输出多少只股票
# 备选方案：20 | 50（推荐）| 100
limit = 50

# 策略最低评分（0-100）
# 备选方案：40（宽松）| 50（中性）| 60（标准）| 70（严格）| 80（非常严格）
min_score = 60

# -------------------- 共识配置 --------------------
# 含义：多个策略的综合评分
[consensus]
# 是否启用共识机制
# 备选方案：true（启用，推荐）| false（禁用）
enabled = true

# 最少命中次数
# 含义：至少需要多少个策略同时看好一只股票
# 备选方案：1（宽松）| 2（标准，推荐）| 3（严格）
min_hit = 2

# 最多输出多少只股票
limit = 50

# 共识计算方法（可选，默认使用 signal.toml 中的配置）
# method = "weighted_by_performance"

# -------------------- 组合构建配置 --------------------
[portfolio]
# 是否启用组合构建
# 备选方案：true（启用，推荐）| false（跳过）
enabled = true

# 股票来源
# 备选方案："consensus"（共识）| "single"（单策略）| "union"（并集）| "intersection"（交集）
source = "consensus"

# 从候选池中选取前N只股票
# 备选方案：5 | 10 | 20（推荐）| 30
top = 20

# 权重分配方法
# -------------------------------------------------------------
# 【备选1】"equal"（等权重）- 最简单
# 【备选2】"liquidity-risk"（流动性风险加权）- 大资金用
# 【备选3】"signal-strength"（信号强度加权）- 策略置信度高时用
# 【备选4】"hybrid"（混合加权）- 推荐
# 【备选5】"risk-parity"（风险平价）- 专业机构用
# -------------------------------------------------------------
weighting = "liquidity-risk"

# 单只股票最大权重
# 备选方案：0.05（5%）| 0.10（10%，推荐）| 0.15（15%）| 0.25（25%）
max_weight = 0.10

# 总资金量（单位：元）
# 备选方案：100000（10万）| 1000000（100万）| 10000000（1000万，推荐）| 100000000（1亿）
capital = 10000000

# 最大参与成交额比例
# 含义：单日买入量不超过该股票成交额的比例
# 备选方案：0.05（5%）| 0.10（10%，推荐）| 0.20（20%）
max_adv_participation = 0.10

# 最大清仓天数（交易日）
# 备选方案：0.5 | 1（推荐）| 2 | 3
max_liquidation_days = 3

# 是否启用市场状态判断
# 备选方案：true（启用，推荐）| false（禁用）
market_regime_enabled = true

# 单行业最大权重
# 备选方案：0.15（15%）| 0.25（25%，推荐）| 0.35（35%）| 0.50（50%）
max_sector_weight = 0.25

# 排除的风险标签
# 备选方案：[] | ["high_volatility"] | ["low_liquidity"] | ["high_volatility", "low_liquidity"]（推荐）
exclude_risk_tags = ["high_volatility", "low_liquidity"]

# -------------------- 调仓执行配置 --------------------
[rebalance]
# 是否启用调仓执行
# 备选方案：true（启用）| false（跳过，只生成组合不执行）
enabled = false

# 当前持仓文件路径
# 备选方案："holdings.csv" | "data/current_positions.csv" | "../holdings.csv"
current_holdings = "holdings.csv"

# 最小交易权重（低于此值的调仓忽略）
# 备选方案：0.005（0.5%）| 0.01（1%，推荐）| 0.02（2%）
min_trade_weight = 0.01

# 最大换手率
# 备选方案：0.20（20%）| 0.50（50%，推荐）| 0.80（80%）| 1.00（100%）
max_turnover = 0.50

# -------------------- 风控配置 --------------------
# 是否启用统一风控（会读取 risk_management.toml）
[risk]
enabled = true

# 是否启用宏观过滤器（会读取 macro_filter.toml）
macro_filter_enabled = true

# 是否启用事件日历（会读取 event_calendar.toml）
event_calendar_enabled = true

# -------------------- 输出配置 --------------------
[output]
# 是否保存结果
save = true

# 输出目录
dir = "reports/daily"

# 输出格式
# 备选方案：["json"] | ["table"] | ["markdown"] | ["json", "markdown"]（推荐）
formats = ["json", "markdown"]

# 是否生成日志
generate_logs = true

# -------------------- 调度配置（可选）--------------------
# 自动运行时间
[schedule]
# 是否启用自动调度
enabled = false

# 运行时间（24小时制）
# 备选方案："09:30"（开盘前）| "15:30"（收盘后，推荐）| "20:00"
run_time = "15:30"

# 时区
timezone = "Asia/Shanghai"

# 错误时重试次数
retry_count = 3

# 重试间隔（秒）
retry_interval_seconds = 60

# -------------------- 通知配置（可选）--------------------
# 会读取 alerts.toml 的配置，此处仅作开关
[notifications]
# 工作流完成时是否发送通知
on_completion = true

# 工作流失败时是否发送通知
on_failure = true