# ============================================================
# 初筛过滤器配置文件（新增）
# 用途：在策略运行前统一过滤，减少后续计算量
# 简单说：先剔除明显不合格的股票，剩下的才交给策略打分
# ============================================================

[task]
type = "pre_filter"
name = "universe-filter"

# -------------------- 基础过滤器 --------------------
[pre_filter.basic]
# 是否排除ST股票
# 含义：ST = Special Treatment，即被特别处理的股票（通常有问题）
# 备选方案：true（排除，推荐）| false（保留）
exclude_st = true

# 是否排除退市风险股
# 含义：有退市风险的股票，风险极高
# 备选方案：true（排除，推荐）| false（保留）
exclude_delisting_risk = true

# 上市不足N天的新股
# 含义：新股上市初期波动大，数据不稳定
# 备选方案：30 | 60（推荐）| 90 | 120
min_listing_days = 60

# 股价下限（元）
# 含义：低于这个价格的不考虑（仙股风险大）
# 备选方案：1.0 | 2.0（推荐）| 5.0
min_price = 2.0

# 股价上限（元）
# 含义：高于这个价格的不考虑（过高股价流动性可能差）
# 备选方案：300 | 500（推荐）| 1000 | 不限制用大数999999
max_price = 500

# -------------------- 流动性过滤器 --------------------
[pre_filter.liquidity]
# 20日均成交额下限（元）
# 含义：过去20天平均每天成交多少金额
# 备选方案：5000万 | 1亿（推荐）| 1.5亿 | 3亿
min_amount_ma20 = 100000000

# 20日均换手率下限（%）
# 含义：每天换手的比例，换手率太低说明不活跃
# 备选方案：0.5% | 1.0%（推荐）| 2.0% | 3.0%
min_turnover = 1.0

# -------------------- 风险过滤器 --------------------
[pre_filter.risk]
# 最大年化波动率
# 含义：波动率太高意味着大起大落，风险大
# 备选方案：0.40（保守）| 0.60（标准）| 0.80（激进）| 1.00（不限制）
max_volatility = 0.60

# 过去1年最大回撤
# 含义：从最高点跌到最低点的最大幅度
# 备选方案：0.30（保守）| 0.50（标准）| 0.70（激进）| 1.00（不限制）
max_drawdown = 0.50

# 是否排除净利润为负
# 含义：亏损的公司（价值策略可单独覆盖，这里一般不过滤）
# 备选方案：true（排除亏损）| false（保留亏损，推荐让策略自己判断）
exclude_negative_net_profit = false

# -------------------- 数据质量过滤器 --------------------
[pre_filter.data_quality]
# 要求最近N天都有交易数据
# 含义：确保股票有足够的历史数据
# 备选方案：100 | 200（推荐）| 250（一年）| 500
min_trading_days = 200

# 要求财务数据更新在M个月以内
# 含义：财报数据不能太旧，否则失去参考价值
# 备选方案：6 | 12（推荐）| 18 | 24
max_financial_data_age_months = 12