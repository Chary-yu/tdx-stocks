# ============================================================
# 事件日历风险管理配置文件
# 用途：避开财报发布、解禁等可能引发剧烈波动的事件
# 简单说：知道什么时候要发布重要消息，提前规避
# ============================================================

[task]
type = "event_calendar"
name = "event-risk-management"

# -------------------- 主开关 --------------------
[event_calendar]
# 是否启用事件规避
# 备选方案：true（启用，推荐）| false（禁用）
enabled = true

# -------------------- 事件来源 --------------------
[event_calendar.sources]
# 财报发布
# 备选方案：true（启用）| false（忽略）
earnings = true

# 分红派息
dividend = true

# 限售股解禁
lockup_expiry = true

# 董事会/股东大会
board_meeting = true

# -------------------- 事件窗口定义 --------------------
# 格式：[前天数, 后天数]，例如 [-3, 1] 表示事件前3天到后1天
[event_calendar.windows]
# 财报窗口
# -------------------------------------------------------------
# 备选方案：
#   - [-5, 2]：长规避期（保守）
#   - [-3, 1]：标准（推荐）
#   - [-1, 0]：仅当天（激进）
#   - []：不规避
# -------------------------------------------------------------
earnings = [-3, 1]

# 解禁窗口
# -------------------------------------------------------------
# 备选方案：
#   - [-10, 10]：长规避期（解禁比例>30%时）
#   - [-5, 5]：标准（推荐）
#   - [-2, 2]：短规避期
# -------------------------------------------------------------
lockup_expiry = [-5, 5]

# -------------------- 遇到事件冲突时的处理动作 --------------------
[event_calendar.action]
# 冲突处理方式
# -------------------------------------------------------------
# "postpone"：推迟买入（最保守，推荐）
#   【联动】postpone_days = 1-3
#
# "reduce_weight"：降低仓位（较灵活）
#   【联动】reduce_weight_factor = 0.25-0.75
#
# "reject"：完全拒绝（非常严格）
#   【适用】高风险事件（如ST、退市风险）
#
# "ignore"：忽略事件（最激进）
#   【适用】对事件有独特判断的专业用户
# -------------------------------------------------------------
on_conflict = "postpone"

# 推迟买入时的等待天数（窗口期结束后再等多少天）
# 备选方案：0 | 1（推荐）| 2 | 3
postpone_days = 1

# 降低权重时的比例系数
# 含义：权重降低到原来的多少倍
# 备选方案：0.25（降为1/4）| 0.50（降为1/2，推荐）| 0.75（降为3/4）
reduce_weight_factor = 0.50