# ============================================================
# 风险情景配置文件
# 用途：强制每只推荐股票都要明确列出可能的风险情景
# 简单说：买之前，先想清楚「最坏情况是什么」
# ============================================================

[task]
type = "risk_scenario"
name = "scenario-requirements"

# -------------------- 主开关 --------------------
[risk_scenario]
# 是否启用风险情景要求
# 备选方案：true（强制执行）| false（不强制，仅建议）
enabled = true

# 每只股票需要列出的风险情景数量
# -------------------------------------------------------------
# 备选方案：
#   1：快速模式（一个核心风险）
#   2：标准模式（技术+基本面，推荐）
#   3：专业模式（技术+基本面+宏观）
#   5：机构模式（全面覆盖）
# -------------------------------------------------------------
min_scenarios_per_stock = 2

# -------------------- 风险情景字段定义 --------------------
# 每只股票必须输出的字段
[risk_scenario.required_fields]
# 情景描述（文字说明）
[risk_scenario.required_fields.scenario_description]
type = "string"
required = true

# 发生概率（0-1的小数）
# 举例：0.3 表示30%的发生概率
[risk_scenario.required_fields.scenario_probability]
type = "float"
min = 0
max = 1

# 影响程度
# low    = 轻微影响（跌幅 < 5%）
# medium = 中等影响（跌幅 5% ~ 15%）
# high   = 严重影响（跌幅 > 15%）
[risk_scenario.required_fields.scenario_impact]
type = "string"
enum = ["low", "medium", "high"]

# 触发条件（什么情况下风险会变成现实）
# 举例："连续3个季度利润增速低于10%"
[risk_scenario.required_fields.scenario_trigger]
type = "string"

# -------------------- 风险情景模板（快速填写）--------------------
# 使用方式：将 {变量} 替换为具体数值
[risk_scenario.templates]
# 技术面风险
# 举例：填入 ma=20 → "股价跌破20日均线，趋势走坏"
technical = "股价跌破{ma}日均线，趋势走坏"

# 基本面风险
# 举例：填入 metric=ROE, quarters=2 → "ROE连续2个季度不及预期"
fundamental = "{metric}连续{quarters}个季度不及预期"

# 宏观风险
# 举例：填入 bps=50 → "利率上升50个基点"
macro = "利率上升{bps}个基点"

# 行业风险
sector = "行业政策收紧，竞争加剧"

# -------------------- 系统级风险聚合 --------------------
[risk_scenario.aggregation]
# 整个组合中，高风险股票的最大数量
# -------------------------------------------------------------
# 备选方案：
#   持仓数量 top=10 → 高风险上限建议3-5
#   持仓数量 top=20 → 高风险上限建议5-8
# -------------------------------------------------------------
max_portfolio_high_risk_stocks = 5

# 整个组合的平均风险概率上限
# 备选方案：0.20（20%）| 0.30（30%，推荐）| 0.40（40%）| 0.50（50%）
max_avg_risk_probability = 0.30

# 是否生成组合级别的风险报告
generate_aggregate_report = true
