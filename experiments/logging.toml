# ============================================================
# 日志配置文件（新增）
# 用途：系统运行日志与调试
# 简单说：记录系统运行过程，方便排查问题
# ============================================================

[task]
type = "logging"
name = "system-logs"

# -------------------- 日志基本配置 --------------------
[logging]
# 日志级别（从低到高）
# -------------------------------------------------------------
# "DEBUG"：最详细，记录所有信息（适合调试）
# "INFO"：标准，记录关键信息（推荐）
# "WARNING"：只记录警告和错误
# "ERROR"：只记录错误
# -------------------------------------------------------------
level = "INFO"

# 是否记录每笔交易
# 备选方案：true（记录）| false（不记录）
log_trades = true

# 是否记录策略评分变化
# 备选方案：true（记录）| false（不记录，推荐节省空间）
log_score_changes = false

# 是否记录调仓决策理由
# 含义：记录为什么买入/卖出某只股票
# 备选方案：true（记录，推荐）| false（不记录）
log_decision_rationale = true

# 日志保留天数
# 备选方案：7 | 30（推荐）| 60 | 90
retention_days = 30

# -------------------- 文件输出 --------------------
# 是否输出到文件
file_output = true

# 日志文件路径
file_path = "logs/system.log"

# 是否按日切割日志
# 含义：每天生成一个新的日志文件
rotate_daily = true

# -------------------- 控制台输出 --------------------
# 是否输出到控制台
console_output = true

# 控制台日志格式
# 备选方案："text"（纯文本）| "json"（JSON格式）| "pretty"（彩色格式）
console_format = "pretty"