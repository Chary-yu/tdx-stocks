# ============================================================
# 统一风险管理配置文件（新增）
# 用途：集中管理所有风控规则，按优先级分层执行
# 简单说：一个统一的地方，管理「什么情况下不能交易」
# ============================================================

[task]
type = "risk_management"
name = "unified-risk-controller"

# ============================================================
# 第一层：硬性风控（不可覆盖，直接拒绝交易）
# 含义：触及这些规则，系统直接禁止交易，不能人工覆盖
# ============================================================
[risk.hard]
# 禁止交易的股票标签
# 含义：带有这些标签的股票，直接排除
# 备选方案：
#   - []：不排除
#   - ["st"]：只排除ST
#   - ["st", "suspended"]：排除ST和停牌股
#   - ["st", "suspended", "delisting_risk"]：排除ST、停牌、退市风险（推荐）
block_tags = ["st", "suspended", "delisting_risk"]

# 禁止交易的行业
# 含义：整个行业的股票都不交易（如政策打压行业）
# 备选方案：[]（不排除）| ["real_estate"]（排除房地产）| ["real_estate", "education"]
block_sectors = []

# 单日最大亏损（元）
# 含义：一天内亏损超过这个金额，触发风控
# 建议：资金量的1-2%
# 备选方案：10000（1万）| 100000（10万，推荐）| 500000（50万）
max_daily_loss = 100000

# 单月最大亏损（元）
# 含义：一个月内亏损超过这个金额，触发风控
# 建议：资金量的5-8%
# 备选方案：50000（5万）| 500000（50万，推荐）| 1000000（100万）
max_monthly_loss = 500000

# ============================================================
# 第二层：软性风控（可覆盖，需人工确认）
# 含义：触及这些规则，系统会警告，但可以人工确认后执行
# ============================================================
[risk.soft]
# 最大回撤阈值
# 含义：组合从高点回撤超过这个比例，自动降仓
# 备选方案：0.10（10%）| 0.15（15%，推荐）| 0.20（20%）| 0.25（25%）
max_drawdown = 0.15

# 触发后降仓比例
# 含义：回撤超标后，仓位降低到多少
# 备选方案：0.30（30%）| 0.50（50%，推荐）| 0.70（70%）
drawdown_reduce_to = 0.50

# 最大年化波动率
# 含义：组合波动率超过此值，需要调整
# 备选方案：0.20（20%）| 0.30（30%，推荐）| 0.40（40%）
max_volatility = 0.30

# 最大集中度（前3大持仓合计权重上限）
# 含义：前3只股票的权重之和不能超过此值
# 备选方案：0.30（30%）| 0.40（40%，推荐）| 0.50（50%）| 0.60（60%）
max_concentration = 0.40

# 最大行业偏离度（相对基准指数）
# 含义：某行业的权重，不能超过基准指数该行业权重的比例
# 备选方案：0.10（10%）| 0.15（15%，推荐）| 0.20（20%）
max_sector_deviation = 0.15

# ============================================================
# 第三层：动态风控（根据市场状态调整）
# 含义：市场环境变化时，自动收紧或放松风控参数
# ============================================================
[risk.dynamic]
# 高波动市场模式
# 含义：当市场整体波动率升高时，自动收紧
# 联动：需要配合 macro_filter 判断市场状态
[risk.dynamic.high_volatility_mode]
max_weight = 0.05      # 单只股票上限减半
max_sector = 0.15      # 行业上限减半
max_adv_participation = 0.05  # 参与率减半

# 低流动性市场模式
# 含义：当市场整体流动性变差时，提高流动性要求
[risk.dynamic.low_liquidity_mode]
min_amount_ma20 = 300000000  # 提高流动性门槛到3亿
max_liquidation_days = 3     # 清仓天数放宽到3天
