# ============================================================
# 订单执行配置文件（新增）
# 用途：将调仓指令转化为具体的下单策略
# 简单说：告诉系统「怎么下单，按什么方式拆单，用限价还是市价」
# ============================================================

[task]
type = "order_execution"
name = "smart-order-router"

# ============================================================
# 拆单策略
# 含义：大单拆成小单，避免冲击市场
# ============================================================
[execution.split]
# 拆单方式
# -------------------------------------------------------------
# 【备选1】"twap"（时间加权平均价格，推荐）
#   含义：在固定时间内，均匀下单
#   适用：大多数情况，最简单
#   联动：需设置 duration_minutes
#
# 【备选2】"vwap"（成交量加权平均价格）
#   含义：跟随市场成交量分布下单
#   适用：对价格敏感的大资金
#   联动：需要实时成交量数据
#
# 【备选3】"iceberg"（冰山订单）
#   含义：只显示一小部分订单，隐藏真实意图
#   适用：不想暴露交易意图时
#   联动：需设置显示数量
#
# 【备选4】"pov"（参与率）
#   含义：按市场成交量的固定比例下单
#   适用：希望跟随市场节奏
#   联动：需设置 target_participation
# -------------------------------------------------------------
method = "twap"

# ----- TWAP参数（当 method = "twap" 时生效）-----
[execution.split.twap]
# 拆单时长（分钟）
# 备选方案：10 | 30（推荐）| 60 | 120
duration_minutes = 30

# 每个切片数量（0表示自动）
# 备选方案：0（自动）| 5 | 10 | 20
num_slices = 0

# ----- PoV参数（当 method = "pov" 时生效）-----
[execution.split.pov]
# 目标参与率（占市场成交量的百分比）
# 备选方案：0.05（5%）| 0.10（10%，推荐）| 0.15（15%）| 0.20（20%）
target_participation = 0.10

# ----- 冰山订单参数（当 method = "iceberg" 时生效）-----
# [execution.split.iceberg]
# # 显示的订单数量（股数）
# display_quantity = 10000
# # 隐藏的订单数量
# hidden_quantity = 100000

# ============================================================
# 限价单策略
# 含义：使用限价单（指定价格），而不是市价单（不管价格）
# ============================================================
[execution.limit_order]
# 是否使用限价单
# 备选方案：true（使用限价单，可能无法成交）| false（使用市价单，一定成交）
enabled = true

# 限价单偏移（相对于盘口的百分点）
# 含义：在盘口价格的基础上，放宽多少点
# 举例：offset_bps=2，盘口卖价10.00，则限价单挂10.02
# 备选方案：0（严格限价）| 2（推荐）| 5 | 10
offset_bps = 2

# 限价单超时（秒）
# 含义：限价单多久没成交就取消
# 备选方案：60 | 300（推荐）| 600 | 1800
timeout_seconds = 300

# 超时后是否转为市价单
# 备选方案：true（转为市价单，保证成交）| false（取消订单，不交易）
timeout_to_market = true

# ============================================================
# 算法交易参数（专业功能）
# ============================================================
[execution.algorithmic]
# 是否启用暗池（Dark Pool）
# 含义：在非公开的交易所交易，可以隐藏意图
# 备选方案：true（启用）| false（禁用，推荐）
dark_pool_enabled = false

# 最大暗池参与比例
# 备选方案：0.10（10%）| 0.20（20%，推荐）| 0.30（30%）
max_dark_pool_share = 0.20