# ============================================================
# 动态止盈止损配置文件（新增）
# 用途：替代固定ATR倍数，根据市场波动自适应调整
# 简单说：市场波动大时，止损放宽一点；波动小时，止损收紧一点
# ============================================================

[task]
type = "stop_loss"
name = "dynamic-stop-loss"

# 止损方式选择
# -------------------------------------------------------------
# 【备选1】"fixed_atr"（固定ATR倍数）
#   含义：使用固定的ATR倍数作为止损（传统方法）
#   适用：初学者，或不想做复杂调整
#   联动：只需设置 base_multiplier
#
# 【备选2】"chandelier"（Chandelier止损）
#   含义：基于最高点和ATR的止损方法，趋势跟踪常用
#   适用：趋势跟踪策略，让利润奔跑
#   联动：需设置 period 和 multiplier
#
# 【备选3】"parabolic_sar"（抛物线转向）
#   含义：跟随价格变化的止损点，会越来越紧
#   适用：强趋势行情
#   联动：需设置 acceleration_step 和 max_acceleration
#
# 【备选4】"volatility_adaptive"（波动率自适应，推荐）
#   含义：根据市场波动自动调整止损倍数
#   适用：大多数情况，最智能
#   联动：需设置三种波动率下的不同倍数
# -------------------------------------------------------------
method = "volatility_adaptive"

# ============================================================
# 波动率自适应止损（当 method = "volatility_adaptive" 时生效）
# ============================================================
[stop_loss.volatility_adaptive]
# 基础倍数（正常波动时使用）
base_multiplier = 2.0

# 高波动时倍数（波动大时放宽止损，避免被震出去）
# 备选方案：2.5 | 3.0 | 3.5
high_volatility_multiplier = 2.5

# 低波动时倍数（波动小时收紧止损，及时锁定利润）
# 备选方案：1.0 | 1.5 | 1.8
low_volatility_multiplier = 1.5

# 波动率判断阈值（年化波动率超过此值算高波动）
# 备选方案：0.30 | 0.40 | 0.50
high_volatility_threshold = 0.40

# 波动率判断阈值（年化波动率低于此值算低波动）
low_volatility_threshold = 0.20

# ============================================================
# Chandelier 止损（当 method = "chandelier" 时生效）
# ============================================================
[stop_loss.chandelier]
# 计算周期（天）
# 备选方案：14 | 22（推荐，约一个月）| 30
period = 22

# 倍数
# 备选方案：2.0 | 3.0（推荐）| 4.0
multiplier = 3.0

# 使用高点（true）还是低点（false）
# true = 使用过去N天的最高点（适合多头）
# false = 使用过去N天的最低点（适合空头）
use_high = true

# ============================================================
# 抛物线转向止损（当 method = "parabolic_sar" 时生效）
# ============================================================
[stop_loss.parabolic_sar]
# 加速步长
# 备选方案：0.01 | 0.02（推荐）| 0.05
acceleration_step = 0.02

# 最大加速值
# 备选方案：0.10 | 0.20（推荐）| 0.30
max_acceleration = 0.20

# ============================================================
# 移动止盈（通用，无论选哪种止损方法都可以启用）
# 含义：当股价上涨后，从高点回撤一定比例时卖出
# ============================================================
[stop_loss.trailing]
# 是否启用移动止盈
# 备选方案：true（启用）| false（禁用）
enabled = true

# 回撤百分比触发止盈
# 含义：从最高点下跌多少比例时卖出
# 备选方案：0.05（5%）| 0.08（8%，推荐）| 0.10（10%）| 0.15（15%）
pullback_pct = 0.08

# 最小持仓天数后才启用移动止盈
# 含义：刚买入的前N天不启用移动止盈，避免被小波动震出去
# 备选方案：3 | 5（推荐）| 7 | 10
min_hold_days = 5