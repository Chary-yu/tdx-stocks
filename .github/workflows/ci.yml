name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,web]"

      - name: Ruff
        run: ruff check .

  type:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,web]"

      - name: Mypy
        run: python -m mypy src/tdx_stocks

  unit:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build coverage

      - name: Install project
        run: python -m pip install -e ".[dev,web]"

      - name: Prepare test artifacts
        run: mkdir -p test-results

      - name: Pytest
        run: coverage run -m pytest -m "not integration" -q --junitxml=test-results/junit.xml

      - name: Coverage report
        run: |
          coverage report -m
          coverage xml -o test-results/coverage.xml

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unit-py${{ matrix.python-version }}
          path: test-results/

  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build coverage

      - name: Install project
        run: python -m pip install -e ".[dev,web]"

      - name: Prepare test artifacts
        run: mkdir -p test-results

      - name: Integration tests
        run: pytest -m integration -q --junitxml=test-results/junit.xml

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: integration
          path: test-results/

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Install project
        run: python -m pip install -e ".[dev,web]"

      - name: Build
        run: python -m build
