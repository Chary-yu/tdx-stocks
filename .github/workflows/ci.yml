name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Install project
        run: python -m pip install -e ".[dev,web]"

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q

      - name: Build
        run: python -m build
